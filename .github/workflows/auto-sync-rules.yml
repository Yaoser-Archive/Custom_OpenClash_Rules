name: Auto sync rules from Aethersailor

on:
  schedule:
    - cron: '7 */2 * * *'   # Every 2 hours at minute 7
  workflow_dispatch:

permissions:
  contents: write

env:
  UPSTREAM_REPO: Aethersailor/Custom_OpenClash_Rules
  UPSTREAM_BRANCH: main
  UPSTREAM_BASE: https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/main/rule

jobs:
  sync-rules:
    if: github.event_name != 'schedule' || github.ref_name == ((vars.WORK_BRANCH != '' && vars.WORK_BRANCH) || 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync rule files from upstream
        run: |
          RULES=(
            "Custom_Direct_Domain.yaml"
            "Custom_Direct_Classical_IP.yaml"
            "Custom_Proxy_Domain.yaml"
            "Custom_Proxy_Classical_IP.yaml"
            "Steam_CDN_Classical.yaml"
            "Custom_Port_Direct.yaml"
          )

          for rule in "${RULES[@]}"; do
            echo "Downloading ${rule}..."
            curl -sL --retry 3 --retry-delay 5 \
              -H "User-Agent: OpenClash-Rule-Sync/1.0" \
              -o "rule/${rule}" \
              "${UPSTREAM_BASE}/${rule}"

            if [ -f "rule/${rule}" ] && [ -s "rule/${rule}" ]; then
              echo "  ✓ Downloaded rule/${rule}"
            else
              echo "  ✗ Failed to download rule/${rule}"
              exit 1
            fi
          done

          echo ""
          echo "All rule files synced successfully."

      - name: Commit synced rule files
        run: |
          git add rule/Custom_Direct_Domain.yaml \
                  rule/Custom_Direct_Classical_IP.yaml \
                  rule/Custom_Proxy_Domain.yaml \
                  rule/Custom_Proxy_Classical_IP.yaml \
                  rule/Steam_CDN_Classical.yaml \
                  rule/Custom_Port_Direct.yaml || true

          if [[ -n $(git status --porcelain rule/Custom_*.yaml rule/Steam_CDN_*.yaml rule/Custom_Port_Direct.yaml) ]]; then
            git commit -m "chore(rules): auto sync rules from Aethersailor"
          else
            echo "No changes in rule files, skip commit."
          fi

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin HEAD:main
